<svg width="300" height="100" viewBox="0 0 300 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .logo-circle {
        animation: spin 20s linear infinite;
      }
    </style>
  </defs>
  
  <!-- Main Circle with gradient -->
  <g class="logo-circle" transform="translate(25, 50)">
    <!-- Outer Ring - Blue -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="#1976D2" stroke-width="2"/>
    <!-- Inner Circle - Orange -->
    <circle cx="0" cy="0" r="18" fill="none" stroke="#FF9800" stroke-width="2"/>
    <!-- Green accent -->
    <circle cx="0" cy="0" r="14" fill="none" stroke="#4CAF50" stroke-width="1.5"/>
    
    <!-- Center circle -->
    <circle cx="0" cy="0" r="10" fill="#1976D2"/>
    <circle cx="0" cy="0" r="8" fill="#fff" opacity="0.3"/>
  </g>
  
  <!-- Text: CIVIC CONNECT -->
  <text x="60" y="45" font-family="Montserrat, Arial, sans-serif" font-size="24" font-weight="900" fill="#1976D2">
    CIVIC
  </text>
  <text x="60" y="65" font-family="Montserrat, Arial, sans-serif" font-size="24" font-weight="900" fill="#FF9800">
    CONNECT
  </text>
  
  <!-- Decorative line -->
  <line x1="55" y1="72" x2="190" y2="72" stroke="#4CAF50" stroke-width="2" stroke-linecap="round"/>
</svg>