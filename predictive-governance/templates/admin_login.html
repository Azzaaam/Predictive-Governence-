<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civic Connect - Admin Access</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
            /* Dark Slate Theme */
            overflow: hidden;
        }

        .login-container {
            background: rgba(30, 30, 30, 0.95);
            padding: 40px;
            border-radius: 5px;
            border-top: 5px solid #d4af37;
            /* Gold Accent */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* Intro Animation Text */
        .intro-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: #ecf0f1;
            margin-bottom: 5px;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .intro-sub {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            color: #d4af37;
            /* Gold */
            margin-bottom: 30px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Form Styling */
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #455a64;
            background: #263238;
            color: #fff;
            border-radius: 2px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            border-color: #d4af37;
            outline: none;
            background: #37474f;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background: #d4af37;
            color: #1a1a1a;
            border: none;
            border-radius: 2px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: #f1c40f;
        }

        .user-link {
            margin-top: 30px;
            display: inline-block;
            font-size: 0.8rem;
            color: #90a4ae;
            text-decoration: none;
            border-bottom: 1px dashed #90a4ae;
        }

        .flash {
            background: #b71c1c;
            color: #ffcdd2;
            padding: 10px;
            border-radius: 2px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            border-left: 3px solid #ff5252;
        }

        /* Ambient Background Grid */
        .bg-grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            transform: rotate(45deg);
            z-index: 1;
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>
    
    <img src="{{ url_for('static', filename='civic-logo.svg') }}" alt="Civic Connect Logo" style="position: fixed; top: 20px; left: 20px; width: 150px; height: auto; z-index: 100; animation: pulse 2s infinite;">

    <div class="login-container animate__animated animate__fadeInUp">
        <h1 class="intro-text animate__animated animate__fadeInDown">CIVIC CONNECT</h1>
        <p class="intro-sub animate__animated animate__fadeInDown animate__delay-1s">Administration Console</p>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for message in messages %}
        <div class="flash">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <!-- Admin Login Form -->
        <form method="POST" action="{{ url_for('admin_login') }}">
            <input type="text" name="username" placeholder="Officer ID / Username" required>
            <input type="password" name="password" placeholder="Access Code" required>
            <button type="submit">Authorize Access</button>
        </form>

        <a href="{{ url_for('user_login') }}" class="user-link">Not an official? Go to Citizen Portal</a>
    </div>
</body>

</html>
